services:
  - type: web
    name: formcraft-app
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: formcraft-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: formcraft-db
    databaseName: formcraft
    user: formcraft
    plan: free
